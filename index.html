<!DOCTYPE html>
<html>
<head>
    <title>유튜브 조회수 추적기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">📊 내 참고 채널 인기 영상</h1>
        <div id="video-list" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        // Vercel 환경변수 대신 여기에 직접 넣거나, API를 통해 가져오도록 설정
        const SUPABASE_URL = 'https://arikevuifyurfnimbzbz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8XgHGqlFUq7S5DFAOeo4ug_o1gv6iOx';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadVideos() {
            const { data, error } = await supabase
                .from('videos')
                .select('*')
                .order('view_count', { ascending: false });

            if (data) {
                const list = document.getElementById('video-list');
                list.innerHTML = data.map(v => `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden">
                        <img src="${v.thumbnail_text}" class="w-full h-48 object-cover">
                        <div class="p-4">
                            <h2 class="font-bold text-lg mb-2 truncate">${v.title}</h2>
                            <p class="text-sm text-gray-500 mb-2">📅 업로드: ${new Date(v.published_at).toLocaleDateString()}</p>
                            <div class="flex justify-between items-center mt-4">
                                <span class="text-blue-600 font-medium">💬 댓글: ${Number(v.comment_count).toLocaleString()}개</span>
                                <span class="text-red-600 font-bold text-lg">👁️ ${(v.view_count / 10000).toFixed(1)}만 회</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }
        loadVideos();
    </script>
</body>
</html>
