<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유튜브 인기 영상 추적기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-white p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-red-500">📺 뚜먹이 채널 분석</h1>
            <button onclick="updateData()" id="sync-btn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition font-bold">
                🔄 데이터 새로고침
            </button>
        </div>
        <div id="video-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-center col-span-full text-gray-400">데이터를 불러오는 중입니다...</p>
        </div>
    </div>

    <script>
        // 변수 이름을 바꿔서 '이미 선언됨' 에러를 방지합니다.
        const SB_URL = 'https://arikezbtfomgltvveuzn.supabase.co'; 
        const SB_KEY = 'sb_publishable_8XgHGd3C5v3W9j2j1G2Z8XgHGd3C5v3W9j2j1G2Z'; 
        
        // 유튜버님의 Supabase 클라이언트 생성
        const mySupabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadVideos() {
            const { data, error } = await mySupabase.from('videos').select('*').order('view_count', { ascending: false });
            const list = document.getElementById('video-list');
            
            if (data && data.length > 0) {
                list.innerHTML = data.map(v => `
                    <div class="bg-slate-800 rounded-xl overflow-hidden shadow-2xl border border-slate-700 hover:border-red-500 transition duration-300">
                        <a href="${v.url}" target="_blank">
                            <img src="${v.thumbnail_text}" class="w-full h-48 object-cover">
                            <div class="p-5">
                                <h2 class="font-bold text-lg line-clamp-2 mb-3 h-14">${v.title}</h2>
                                <div class="flex justify-between items-end mt-4">
                                    <span class="text-blue-400 font-semibold text-sm">💬 댓글 ${Number(v.comment_count).toLocaleString()}개</span>
                                    <span class="text-2xl font-black text-red-500">${(v.view_count / 10000).toFixed(1)}<span class="text-sm">만 회</span></span>
                                </div>
                            </div>
                        </a>
                    </div>
                `).join('');
            } else {
                list.innerHTML = `<p class="text-gray-400 text-center col-span-full">아직 수집된 영상이 없습니다. [새로고침]을 눌러주세요.</p>`;
            }
        }
        
        async function updateData() {
            const btn = document.getElementById('sync-btn');
            btn.innerText = "⏳ 수집 중...";
            btn.disabled = true;

            try {
                // 서버의 수집 기능을 호출합니다.
                const res = await fetch('/api/fetch-videos');
                if (!res.ok) throw new Error();
                
                alert("데이터 수집 완료!");
                loadVideos(); // 화면 갱신
            } catch (e) { 
                alert("수집 중 서버 에러가 발생했습니다. Vercel 로그를 확인해 주세요."); 
            } finally { 
                btn.innerText = "🔄 데이터 새로고침"; 
                btn.disabled = false;
            }
        }

        // 처음에 자동으로 목록 로드
        loadVideos();
    </script>
</body>
</html>
